# Registr strávníků se stravovacími omezeními – Tábor 26. Ručně editovatelné.
#
# `stravnici` je zdroj pravdy. Seznam alergenů ke sledování (watch-list) se
# NEpíše ručně – generátor ho odvodí jako sjednocení polí `alergeny` přes všechny
# strávníky a vykreslí na manuál (vystup/omezeni.html).
#
# Hodnoty v poli `alergeny` MUSÍ být `id` z číselníku `ciselnik_alergenu` níže
# (tytéž hodnoty se používají i v receptech v poli `alergeny:`), jinak generátor
# vypíše varování. Bezlepková/bezlaktózová dieta = zapiš jako alergen
# `lepek` / `mléko` (promítne se do watch-listu); pole `diety` nech jen pro
# vegetarián/vegan.
#
# POZN.: Záznamy níže jsou PŘÍKLADY k přepsání – skutečné strávníky doplníme.

stravnici:
  - kdo: "Příklad – přepsat"   # přezdívka nebo jméno (volný text)
    pritomnost: ""             # volitelné: kdy je na táboře (doplníme později), např. "celý tábor", "2.–10. 7."
    diety: [vegetarián]        # volitelné: vegetarián / vegan
    alergeny: [ořechy]         # zdravotní alergeny – id z číselníku níže
    nejedna: [houby]           # další věci, které nejí (ne nutně alergie) – ovlivňuje alternativu
    zavaznost: ""              # volitelné: "těžká / anafylaxe" | "mírná nesnášenlivost"
    poznamka: ""               # volný text: detail speciálního omezení, nápad na náhradu

  - kdo: "Příklad 2 – přepsat"
    pritomnost: ""
    diety: []
    alergeny: [lepek, mléko]   # = bezlepková + bezlaktózová
    nejedna: []
    zavaznost: "mírná nesnášenlivost"
    poznamka: ""

# Číselník alergenů: `id` = přesná hodnota používaná v receptech; `nazev`+`ikona`
# slouží k vykreslení manuálu a zároveň jako seznam povolených hodnot pro validaci.
ciselnik_alergenu:
  - { id: lepek,         nazev: "Lepek",           ikona: "🌾" }
  - { id: mléko,         nazev: "Mléko / laktóza", ikona: "🥛" }
  - { id: vejce,         nazev: "Vejce",           ikona: "🥚" }
  - { id: ořechy,        nazev: "Ořechy",          ikona: "🥜" }
  - { id: sezam/semínka, nazev: "Sezam a semínka", ikona: "🌰" }
  - { id: kokos,         nazev: "Kokos",           ikona: "🥥" }
  - { id: sója,          nazev: "Sója",            ikona: "🫘" }
  - { id: ryby,          nazev: "Ryby",            ikona: "🐟" }
  - { id: hořčice,       nazev: "Hořčice",         ikona: "🌭" }
  - { id: celer,         nazev: "Celer",           ikona: "🥬" }
