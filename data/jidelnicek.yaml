nazev: "Jídelníček — Tábor 26"
termin: "2026-07-04 (snídaně) – 2026-07-17 (večeře)"
pozn: >-
  Vyvážený návrh. Přes den (horko) lehčí jídla, večer vydatnější.
  Oběd = polévka + hlavní jídlo. Nákupy cca à 3–4 dny (4.7., 8.7., 11.7., 14.7.) –
  syrové maso se vaří v den nákupu nebo den poté. První a poslední den lehké recepty
  (zatím jen vařič, kamna se stavějí později). K ruční úpravě.
