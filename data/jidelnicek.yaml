    svacina1: [ovoce]
    obed: [rajska-polevka, recky-kuskusovy-salat]
    svacina2: [jogurt]
    vecere: [pasta-e-ceci]
    poznamky: "NÁKUP. 1. den – jen vařič, lehká jídla bez pečení. Maso z nákupu se vaří až od 5.7."
