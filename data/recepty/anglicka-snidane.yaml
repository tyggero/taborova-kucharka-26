  - "Rozpal grilovací pánev a nasucho v ní osmahni toasty."
  - "Přidej lžičku olivového oleje a osmahni slaninu. Až pustí tuk, opeč párky. Hotové uzeniny odeber z pánve a ulož pod pokličku, aby nevychladly."
  - "(volitelné)Narychlo osmaž na silné plátky nakrájená rajčata, lehce osol a opepři."
  - "Fazole ohřej v hrnci a dochuť."
  - "Nakonec usmaž volské oko tak, aby žloutek zůstal krásně tekutý."
  - "Vše naservíruj na talíř, toust pomaž máslem (a podávej s pomerančovou marmeládou.)"
