vegetarian: false
poznamky: >-
  V Notionu byl jen bookmark (odkaz) s titulkem „3 recepty na pravou anglickou
  snídani – foodora.cz" + vložená DB surovin. Recept vytěžen z webu (foodora.cz
  vrací 403, množství doplněna z paralelního receptu zena.aktualne.cz „Pravá
  anglická snídaně" – suroviny na 1 osobu). Pro tábor (~40 osob) je třeba množství
  násobit a zjednodušit (např. míchaná vejce místo volských ok). Mléko = máslo.
