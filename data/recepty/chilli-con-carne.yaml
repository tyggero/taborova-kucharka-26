id: chilli-con-carne
nazev: Chilli con carne
zdroj: Skautská kuchařka (Táborová Skautská Kuchařka)
odkaz: ""
stitky: [Oběd, Večeře]
porce_original: 10
casy:
  - { faze: Příprava, popis: "15 min" }
  - { faze: Restování, popis: "10 min" }
  - { faze: Dušení, popis: "30 min" }
suroviny:
  - { surovina: mleté maso, mnozstvi: 1, jednotka: kg, poznamka: "mix hovězí/vepřové nebo jen hovězí", sekce: "Maso a zelenina" }
  - { surovina: cibule, mnozstvi: 5, jednotka: ks, poznamka: "", sekce: "Maso a zelenina" }
  - { surovina: mrkev, mnozstvi: 3, jednotka: ks, poznamka: "nastrouhaná", sekce: "Maso a zelenina" }
  - { surovina: feferonka, mnozstvi: 2, jednotka: ks, poznamka: "nasekaná", sekce: "Maso a zelenina" }
  - { surovina: česnek, mnozstvi: 10, jednotka: stroužek, poznamka: "", sekce: "Maso a zelenina" }
  - { surovina: olivový olej, mnozstvi: null, jednotka: "", poznamka: "na restování", sekce: "Maso a zelenina" }
  - { surovina: sekaná rajčata v plechovce, mnozstvi: 1, jednotka: kg, poznamka: "", sekce: Omáčka }
  - { surovina: červené fazole v nálevu, mnozstvi: 1, jednotka: kg, poznamka: "přecedit", sekce: Omáčka }
  - { surovina: vývar/voda, mnozstvi: 750, jednotka: ml, poznamka: "", sekce: Omáčka }
  - { surovina: hořká čokoláda 70%, mnozstvi: 2, jednotka: kostička, poznamka: "", sekce: Omáčka }
  - { surovina: římský kmín, mnozstvi: 2.5, jednotka: KL, poznamka: "(kávová lžička)", sekce: Koření }
  - { surovina: oregano, mnozstvi: 2.5, jednotka: KL, poznamka: "", sekce: Koření }
  - { surovina: cukr, mnozstvi: 1, jednotka: KL, poznamka: "", sekce: Koření }
  - { surovina: tymián/petrželka, mnozstvi: 3, jednotka: snítka, poznamka: "čerstvý, na dochucení", sekce: Koření }
  - { surovina: sůl, mnozstvi: null, jednotka: "", poznamka: dle chuti, sekce: Koření }
  - { surovina: pepř, mnozstvi: null, jednotka: "", poznamka: dle chuti, sekce: Koření }
  - { surovina: zakysaná smetana, mnozstvi: 500, jednotka: ml, poznamka: "k podávání", sekce: "K podávání" }
postup:
  - "Najemno si nakrájej cibuli a orestuj ji v hrnci. Když začne zlátnout, přidej 7 stroužků nasekaného česneku a promíchej. Pak přidej oloupanou a nahrubo nastrouhanou mrkev, orestuj a následně přidej maso."
  - "Maso osol, opepři, posyp kmínem a zprudka opékej asi 5 minut. Vařečkou nebo šťouchadlem na brambory maso odděluj od sebe, aby bylo sypké. Přidej nasekanou feferonku, rajčata a znovu orestuj."
  - "Poté přidej vývar/vodu, čokoládu, cukr, zbytek česneku, oregano a přecezené fazole. Na mírném ohni vše společně dus ještě asi 30 minut."
  - "Finálně dochuť solí, pepřem, přidej nasekaný tymián/petrželku a podávej do ešusu spolu s lžící smetany. Jako příloha se nejlépe hodí rýže, chleba nebo nachos."
nutrice_na_porci: { kcal: 480, bilkoviny_g: 28, sacharidy_g: 35, tuky_g: 24 }
alergeny: [mléko]
vegetarian: false
poznamky: >-
  Vytěženo z tištěné Skautské kuchařky (foto v assets/recepty/chilli-con-carne.jpg, str. 88),
  fotka dobře čitelná, množství uvedena přímo v receptu na 10 porcí. Zakysaná smetana a
  čokoláda obsahují mléko (čokoláda zkontrolovat – některé hořké jsou bez mléka).
  Bez příloh. Příloha (rýže/chleba/nachos) přidá lepek/další alergeny.
zdroj_dat: foto
overit: false
