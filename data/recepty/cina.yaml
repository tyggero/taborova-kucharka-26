postup:
  - "Maso očisti od šlach a tučných částí a nakrájej ho na tenké nudličky. Smíchej ho se solí, polovinou koření a trochou oleje. Pokud máš slanou kořenicí směs, sol méně. Nech chvíli odležet."
  - "Všechnu zeleninu umyj a nakrájej na tenké nudličky nebo kolečka. Mrkev můžeš škrabkou naloupat na dlouhé tenké proužky, které nahrubo překrájíš. Tvrdší zeleninu (mrkev, zelí) dej bokem, měkčí (cuketa, paprika, pórek) zvlášť."
  - "Rozpal kotlík nebo pánev na ohni a přidej olej. Maso opékej po částech, aby se rychle zatáhlo a nevařilo ve vlastní šťávě. Opečené maso přendávej do hrnce."
  - "Když je všechno maso opečené, přilij k němu trochu vody (tak, aby bylo těsně ponořené), přidej polovinu sójové a ústřicové omáčky a nech pod pokličkou dusit asi 30 minut (pokud vaříš drůbeží variantu, dušení není nutné)."
  - "Na druhé pánvi nebo v kotlíku opékej zeleninu. Nejprve tvrdší druhy (mrkev, zelí), po chvíli přidej měkčí zeleninu (cuketa, pórek, paprika). Pokud se ti vše nevejde do jedné pánve, restuj zeleninu postupně. Cílem je, aby byla měkká, ale ne rozvařená."
  - "Jakmile je zelenina hotová, můžeš ji smíchat s masem. Přidej zbývající sójovou a ústřicovou omáčku a ocet. Pokud je směs moc hustá, přidej trochu vody nebo vývaru."
  - "Pokud chceš omáčku hustší, rozmíchej 1 lžíci solamylu ve studené vodě a přidej do směsi. Promíchej a nech krátce probublat."
  - "Podávej s rýží nebo nudlemi, posyp smaženou cibulkou, arašídy, sezamovými semínky nebo koriandrem."
