poznamky: "Vege verze: maso nahraď tofu, seitanem nebo hrachovými nudličkami; tofu/seitan nakrájej na kousky a orestuj na oleji před přidáním zeleniny. Sójová a ústřicová omáčka jsou slané, proto sůl přidávej opatrně. Ozdoba arašídy/sezam = pozor na ořechy a semínka."
