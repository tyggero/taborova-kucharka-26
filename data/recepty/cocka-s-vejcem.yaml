  - { surovina: zeleninový vývar/voda, mnozstvi: 3, jednotka: l, poznamka: "", sekce: Základ }
  - { surovina: hnědá čočka, mnozstvi: 300, jednotka: g, poznamka: "namočit min. 3 h předem", sekce: Základ }
  - { surovina: rajčata z plechovky, mnozstvi: 400, jednotka: g, poznamka: "", sekce: Základ }
  - { surovina: parmazán nebo jiný sýr, mnozstvi: 300, jednotka: g, poznamka: "", sekce: Základ }
