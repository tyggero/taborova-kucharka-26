  - { surovina: cibule, mnozstvi: 2, jednotka: ks, poznamka: nadrobno, sekce: Zelenina }
  - { surovina: česnek, mnozstvi: 5, jednotka: stroužek, poznamka: nadrobno, sekce: Zelenina }
  - { surovina: řapíkatý celer, mnozstvi: 7, jednotka: stonek, poznamka: "1 ks řapíkatého celeru, nasekat", sekce: Zelenina }
