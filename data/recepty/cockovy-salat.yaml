id: cockovy-salat
nazev: Čočkový salát
zdroj: Táborová Skautská Kuchařka (str. 138)
odkaz: ""
stitky: [Svačina]
porce_original: 10
casy:
  - { faze: Vaření, popis: "20 min" }
  - { faze: Chlazení, popis: "30 min" }
  - { faze: Příprava, popis: "15 min" }
suroviny:
  - { surovina: čočka beluga, mnozstvi: 400, jednotka: g, poznamka: "", sekce: Salát }
  - { surovina: salátová okurka, mnozstvi: 2, jednotka: ks, poznamka: "", sekce: Salát }
  - { surovina: červená paprika, mnozstvi: 2, jednotka: ks, poznamka: "", sekce: Salát }
  - { surovina: červená cibule, mnozstvi: 2, jednotka: ks, poznamka: "", sekce: Salát }
  - { surovina: máta, mnozstvi: null, jednotka: "", poznamka: "VOLITELNÉ – pár nasekaných lístků", sekce: Salát }
  - { surovina: olivový olej, mnozstvi: null, jednotka: "", poznamka: na zálivku, sekce: Dresink }
  - { surovina: šťáva z limety, mnozstvi: 1, jednotka: limeta, poznamka: "šťáva z jedné limety", sekce: Dresink }
  - { surovina: sůl, mnozstvi: null, jednotka: "", poznamka: dle chuti, sekce: Dresink }
  - { surovina: pepř, mnozstvi: null, jednotka: "", poznamka: dle chuti, sekce: Dresink }
postup:
  - "Čočku pečlivě propláchni a dej vařit přibližně na 20 minut. Jakmile je hotová, tak ji sceď a nech vystydnout. Luštěniny nikdy nesol v průběhu vaření, nezměkly by."
  - "Nakrájej si zeleninu na kostičky, cibuli najemno a smíchej se studenou čočkou."
  - "Zalij limetovou šťávou, zakapej olivovým olejem, jemně osol a opepři."
  - "Fajnšmekři můžou dochutit několika najemno nasekanými mátovými lístky (volitelné)."
nutrice_na_porci: { kcal: 180, bilkoviny_g: 9, sacharidy_g: 22, tuky_g: 6 }
alergeny: []
vegetarian: true
poznamky: "Nadstavba na teplý salát pro hladovce: přidat 400 g sýra halloumi opečeného na plátky a 100 g sušených rajčat (na nich orestovat cibuli místo olivového oleje) a balení baby špenátu nebo rukoly; v této variantě se nedochucuje mátou."
zdroj_dat: foto
overit: false
