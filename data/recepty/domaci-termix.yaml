postup:
  - "Z mléka a vanilkového pudinkového prášku uvař podle návodu na sáčku hustý puding a nech ho vychladnout."
  - "Tvaroh utři s cukrem do hladka a vmíchej vychladlý puding, ať vznikne nadýchaný krém."
  - "Piškoty navrstvi do misek nebo ešusů (případně je lehce namoč v mléce) a zalij krémem; nech vychladit."
