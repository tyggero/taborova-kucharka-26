postup:
  - "V pánvi nebo nižším kastrolu rozehřejte máslo a restujte na něm cibuli nakrájenou na kostičky. Přidejte mrkev nakrájenou podle výběru (kolečka, půlkolečka, kostičky či nudličky). Restujte na mírném plameni zhruba 2 minuty."
  - "Zaprašte hladkou moukou, zamíchejte a zalijte vývarem či vodou. Rozmíchejte dohladka, dochuťte solí, bílým pepřem a muškátovým květem. Duste přibližně 10 minut, až bude mrkev měkká. Na závěr dochuťte cukrem nebo citronovou šťávou."
  - "Mezitím uvařte oloupané a nakrájené brambory v osolené vodě doměkka. Slijte je a promíchejte s kouskem másla a pažitkou či petrželkou."
  - "V pánvi rozpusťte přepuštěné máslo. Plátky masa rozkrojte podélně na výšku asi 1,5 cm, naklepejte je, osolte, opepřete a lehce obalte v mouce. Smažte zhruba 3–5 minut z každé strany, až budou hezky opečené."
  - "Servírujte dušenou mrkev s vařenými bramborami a plátkem masa."
nutrice_na_porci: { kcal: 620, bilkoviny_g: 42, sacharidy_g: 45, tuky_g: 30 }
