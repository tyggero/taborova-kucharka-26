id: francouzska-polevka
nazev: Francouzská cibulová polévka
zdroj: vlastní (běžný recept)
odkaz: ""
stitky: [polévka]
porce_original: 4
casy:
  - { faze: Příprava, popis: "10 min" }
  - { faze: Vaření, popis: "45 min" }
  - { faze: Pečení, popis: "10 min" }
suroviny:
  - { surovina: cibule, mnozstvi: 500, jednotka: g, poznamka: "na tenké plátky; ideálně i část červené", sekce: Polévka }
  - { surovina: máslo, mnozstvi: 50, jednotka: g, poznamka: "na karamelizaci cibule", sekce: Polévka }
  - { surovina: olej, mnozstvi: 1, jednotka: lžíce, poznamka: "k máslu, aby se nepřepálilo", sekce: Polévka }
  - { surovina: hovězí nebo zeleninový vývar, mnozstvi: 1, jednotka: l, poznamka: "", sekce: Polévka }
  - { surovina: hladká mouka, mnozstvi: 1, jednotka: lžíce, poznamka: "na zahuštění (volitelné)", sekce: Polévka }
  - { surovina: bílé víno, mnozstvi: 100, jednotka: ml, poznamka: "volitelné, na deglazování", sekce: Polévka }
  - { surovina: bageta/toustový chléb, mnozstvi: 4, jednotka: plátek, poznamka: "opečené topinky na polévku", sekce: Topinky }
  - { surovina: strouhaný sýr (ementál/gruyère), mnozstvi: 100, jednotka: g, poznamka: "na zapečení", sekce: Topinky }
  - { surovina: česnek, mnozstvi: 1, jednotka: stroužek, poznamka: "na potření topinek", sekce: Topinky }
  - { surovina: sůl, mnozstvi: null, jednotka: "", poznamka: "dle chuti", sekce: Dochucení }
  - { surovina: pepř, mnozstvi: null, jednotka: "", poznamka: "dle chuti", sekce: Dochucení }
postup:
  - "Cibuli oloupejte a nakrájejte na tenké plátky."
  - "V hrnci rozehřejte máslo s lžící oleje a cibuli na mírném ohni pomalu karamelizujte cca 20–30 minut do zlatohněda, občas zamíchejte."
  - "Zaprašte moukou, krátce orestujte. Případně podlijte bílým vínem a nechte odpařit."
  - "Zalijte horkým vývarem, osolte, opepřete a vařte cca 15–20 minut."
  - "Plátky bagety opečte (topinky) a potřete stroužkem česneku."
  - "Polévku nalijte do misek, navrch položte topinku, posypte strouhaným sýrem a zapečte pod grilem nebo v troubě, dokud sýr nezačne bublat a zezlátne."
nutrice_na_porci: { kcal: 350, bilkoviny_g: 12, sacharidy_g: 30, tuky_g: 18 }
alergeny: [lepek, mléko]
vegetarian: true
poznamky: >-
  POZOR: V Notionu u tohoto receptu NENÍ použitelná fotka ani text – v těle stránky je
  pouze vložené video (.mp4 attachment) a prázdná vložená DB surovin. Recept je proto
  doplněn jako STANDARDNÍ francouzská cibulová polévka (francouzská polévka = nejčastěji
  cibulačka se zapečeným sýrem). Suroviny i množství je nutné ověřit oproti videu/záměru
  kuchaře. Vegetariánské při použití zeleninového vývaru; sýr a chléb = alergeny mléko+lepek.
zdroj_dat: vlastni
overit: true
