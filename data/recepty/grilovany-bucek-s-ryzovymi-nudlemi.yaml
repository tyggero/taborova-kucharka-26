postup:
  - "Bůček nakrájej na tenké plátky, lehce naklepej a rozlož na pracovní plochu. Česnek utři s půlkou soli a vmíchej do hořčice a sójové omáčky. Smíchej papriku, sůl, cukr, pepř a každý plátek okořeň z obou stran, poté potři hořčicovou směsí a nech podle možností minimálně 1 hodinu odležet."
  - "Česnek na zálivku nakrájej na tenké plátky, promíchej se zbytkem surovin a nech odležet. Před podáváním ohřej na ohni."
  - "Nudle namoč do vlažné vody na 1 hodinu. Vodu slij a nudle vlož do vroucí vody asi na 2 minuty, sceď a poté ihned podávej."
  - "Zeleninu do salátu nakrájej na nudličky a smíchej s bylinkami a kopřivou."
  - "Bůček můžeš grilovat nebo použij železný tál či pánev na roštu. Peč přibližně 3 minuty z každé strany dozlatova."
  - "Do ešusu servíruj nejdříve nudle a salát, pak přelij zálivkou, přidej maso a ozdob jarní nebo červenou cibulkou, popř. dalšími surovinami."
