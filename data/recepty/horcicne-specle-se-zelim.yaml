postup:
  - "Máslo rozpusť a smíchej s mlékem, vejci, hořčicí a solí."
  - "Pomalu přidávej mouku a vytvoř řidší těsto, které nech cca 10 minut odstát."
  - "Těsto protlač skrz hrubý cedník nebo struhadlo do vroucí osolené vody. Míchej odspoda vařečkou, dokud špecle nevyplavou, pak je seber sítem a ihned promasti olivovým olejem."
  - "Část vody z vaření špeclí uchovej."
  - "Cibuli oloupej a najemno nakrájej. V hrnci na sádle ji orestuj dohněda (ale nespal). Cibulku si poté odlož stranou."
  - "Do stejného hrnce přidej další sádlo a zarestuj na kostičky pokrájenou slaninu nebo uzené."
  - "Přidej překrájené, řádně okapané kysané zelí, nech hezky opéct a přidej špecle a odloženou cibulku."
  - "Celou směs podlij trochou vody z vaření špeclí, dochuť solí, pepřem, prolisovaným česnekem a nasekanou petrželkou."
  - "Podávej posypané nastrouhaným sýrem."
