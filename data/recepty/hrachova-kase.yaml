postup:
  - "Hrách si nemusíš namáčet do vody příliš dlouho předem – je totiž už oloupaný. Může se ale stát, že se ti bude špatně odhadovat čas potřebný k uvaření jídla. Doporučujeme proto hrách namočit na půl dne – den předem."
  - "Uzené maso zalij vodou tak, aby bylo ponořené, osol a dej vařit. Vař doměkka – když do něj píchneš vidlička musí snadno projít. Maso vylov a nechej vychladnout třeba na tácech."
  - "Vodu, ve které byl hrách namočený, slij. Zalij ho dvakrát tak velkým objemem vývaru z uzeného masa (případně doplň vodou). Pokud je to potřeba, dosol. Přidej koření. Vař spíš na mírném nebo středním plameni až do chvíle, než se hrách úplně rozpadne. Pokud se vytvoří na hladině pěna, seber ji lžící nebo naběračkou."
  - "Do horké kaše přidej máslo, aby se hezky rozpustilo. Pokud je příliš hustá (a to by být neměla), můžeš ji zředit teplým mlékem. Počítej s tím, že čekáním v hrnci zhoustne."
  - "Kaši dochuť: použij rozmačkaný česnek a majoránku rozemnutou v dlani. Česnek přidávej postupně a ochutnávej (vždycky novou lžičkou). Pokud máš možnost, můžeš kaši rozmixovat tyčovým mixérem, nebo prolisovat přes masový mlýnek – pokud vaříš spíš méně porcí. Použít se dá i mačkadlo na brambory."
  - "Uzené maso po vychladnutí ober – okrájej a otrhej z něj všechny kousky až na kost. Tučné a trochu gumové kousky dej zvlášť. Cibulku si nakrájej na kostičky, nemusí být úplně malé. Tučné maso nakrájej na zhruba stejné kousky."
  - "Na pánev dej trochu oleje a pomalu opékej kousky tučného masa. Až začnou vypadat trochu jako škvarky, přidej i cibuli a opékej dozlatova. Přidej koření. Vař spíš na hezky zlatavé, nepřepečené, a vysyp spíš menší plamen."
  - "Kaši pořádně dochuť máslem, zředěnou kaši namáčej nebo nakladej s opečenou cibulkou a masem. Podávej s nakládanou nebo kvašenou okurkou."
nutrice_na_porci: { kcal: 480, bilkoviny_g: 26, sacharidy_g: 50, tuky_g: 18 }
alergeny: [mléko]
vegetarian: false
poznamky: >-
  Vytěženo z tištěné Skautské kuchařky (2 strany; foto v assets/recepty/hrachova-kase-1.jpg
  a hrachova-kase-2.jpg). Porce 10. Recept má v kuchařce DVĚ verze:
  (1) MASOVÁ s uzeným masem (zapsána výše) a
  (2) VEGAN/VEGETARIÁNSKÁ S LILKEM místo masa.
  Suroviny vege verze (s lilkem): 1 kg žlutého půleného hrachu, 4 ks cibule,
  10 stroužků česneku, voda/zeleninový vývar, řepkový/olivový olej, 4 ks lilku,
  římský kmín, uzená paprika (případně kurkuma), sůl, 100–150 g másla (lze
  rostlinný tuk), mléko (nemusí být), červená cibule/pórek.
  Postup vege verze: (1) Hrách prober a namoč do vody na dobu podle svých možností,
  vodu slij a hrách nechej okapat v cedníku. (2) Lilek nakrájej na kostky (asi 2×2 cm),
  posypej solí a dej do cedníku; během půl hodiny se na něm objeví malé kapky vody.
  (3) Cibuli nakrájej nadrobno, do hrnce dej olej a přidej cibuli, na mírném ohni ji
  nechej zezlátnout. Přisypej římský kmín a uzenou papriku (+ kurkumu), zamíchej a
  nechej rozvonět. (4) Přidej hrách, stroužky česneku a zalij vodou nebo vývarem;
  tekutiny by mělo být 2× víc než hrachu. Podle potřeby přidej sůl. (5) Vař na mírném
  ohni až do chvíle, kdy se hrách úplně rozpadne. Vyndej česnek, rozmačkej ho vidličkou
  a vrať do kaše. (6) Cedníkem s lilkem pořádně zatřes a zbývající vodu osuš papírovými
  utěrkami. Do mísy si dej hladkou mouku, přidej lilek a třesením ho pěkně obal.
  (7) V pánvi si rozehřej vyšší vrstvu oleje a lilek v něm postupně osmaž dozlatova,
  vždy jen v jedné vrstvě. (8) Kaši podle potřeby dochuť máslem, zřeď teplým mlékem,
  přidej sůl a koření. (9) Nakonec přidej něco svěžího, co křupe – nakrájenou cibulku
  či pórek, fenykl, mladé zelí apod. Semínka, oříšky nebo kapary tak nebudou k zahození.
  Podávej s opečeným chlebem.
  Masová verze obsahuje mléko (a máslo); vege verze je při použití rostlinného tuku
  bez mléka i veganská (POZOR: vege verze obaluje lilek v hladké mouce = lepek).
  overit: true kvůli orientačnímu množství uzeného masa/másla a dvěma variantám
  k výběru při finalizaci.
