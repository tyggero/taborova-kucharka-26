id: hraskova-polevka
nazev: Hrášková polévka
zdroj: Toprecepty.cz (podle Pohlreicha)
odkaz: https://www.toprecepty.cz/recept/11012-hraskova-polevka-podle-pohlreicha/
stitky: [polévka]
porce_original: 4
casy:
  - { faze: Příprava, popis: "10 min" }
  - { faze: Vaření, popis: "30 min" }
suroviny:
  - { surovina: hrášek (mražený), mnozstvi: 300, jednotka: g, poznamka: "rozmrazit ve vlažné vodě, okapat; 4 lžíce si odložit na ozdobu", sekce: Polévka }
  - { surovina: brambory, mnozstvi: 2, jednotka: ks, poznamka: "střední, na kostičky", sekce: Polévka }
  - { surovina: cibule, mnozstvi: 1, jednotka: ks, poznamka: "oloupaná", sekce: Polévka }
  - { surovina: slanina, mnozstvi: 150, jednotka: g, poznamka: "50 g do polévky, zbytek osmažit na ozdobu", sekce: Polévka }
  - { surovina: česnek, mnozstvi: 1, jednotka: stroužek, poznamka: "", sekce: Polévka }
  - { surovina: zeleninový vývar, mnozstvi: 1, jednotka: l, poznamka: "", sekce: Polévka }
  - { surovina: olej nebo sádlo, mnozstvi: null, jednotka: "", poznamka: "na orestování", sekce: Polévka }
  - { surovina: smetana ke šlehání, mnozstvi: 150, jednotka: ml, poznamka: "", sekce: Polévka }
  - { surovina: sůl, mnozstvi: null, jednotka: "", poznamka: "dle chuti", sekce: Polévka }
  - { surovina: mletý pepř, mnozstvi: null, jednotka: "", poznamka: "dle chuti", sekce: Polévka }
  - { surovina: toustový chléb, mnozstvi: 2, jednotka: plátky, poznamka: "na kostičky", sekce: Krutony }
postup:
  - "Rozmraž hrášek ve vlažné vodě a okapej. Na oleji či sádle osmaž oloupanou cibuli a 50 g slaniny."
  - "Přidej hrášek (4 lžíce si odlož) a brambory nakrájené na kostičky. Orestuj, pak přilij vývar, přidej česnek, pepř a sůl."
  - "Po změknutí brambor odstav z ohně a rozmixuj do hladka."
  - "Přilij smetanu a nech projít varem."
  - "Zbylou slaninu osmaž, přidej na kostičky nakrájený toustový chléb a nech lehce zezlátnout."
  - "Dochuť a podávej ozdobené slaninou, odloženým hráškem a krutony."
nutrice_na_porci: { kcal: 230, bilkoviny_g: 9, sacharidy_g: 20, tuky_g: 13 }
alergeny: [lepek, mléko]
vegetarian: false
poznamky: "Pro vegetariánskou/bezlepkovou variantu: vynech slaninu (nahraď osmaženou zeleninou nebo opraženými semínky) a krutony udělej z bezlepkového pečiva."
zdroj_dat: url
overit: false
