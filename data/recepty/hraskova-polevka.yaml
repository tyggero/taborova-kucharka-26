poznamky: >-
  NEVYTĚŽENO. V Notion stránce (382a86fa-0044-80c6-a0b9-edb2b4e66570) není žádný recept –
  jen prázdná vložená DB surovin a interní bookmark, žádná fotka ani odkaz. Suroviny i postup
  jsou pouze PLACEHOLDERY z běžné hráškové polévky a je NUTNÉ je celé doplnit ručně. Štítek:
  polévka. Nutrice je hrubý odhad. Alergeny závisí na doplnění (smetana = mléko, případná
  jíška = lepek). Vegetariánská varianta předpokládána.
zdroj_dat: vlastni
