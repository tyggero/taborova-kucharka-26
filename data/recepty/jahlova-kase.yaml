id: jahlova-kase
nazev: Jáhlová kaše
zdroj: Táborová Skautská Kuchařka
odkaz: ""
stitky: [Snídaně]
porce_original: 10
casy:
  - { faze: Příprava, popis: "5 min" }
  - { faze: Vaření, popis: "25 min" }
suroviny:
  - { surovina: mléko, mnozstvi: 2, jednotka: l, poznamka: "", sekce: Kaše }
  - { surovina: jáhly, mnozstvi: 500, jednotka: g, poznamka: "před vařením spařit/přelít horkou vodou", sekce: Kaše }
  - { surovina: máslo, mnozstvi: 100, jednotka: g, poznamka: "", sekce: Kaše }
  - { surovina: sůl, mnozstvi: 1, jednotka: PL, poznamka: "", sekce: Kaše }
  - { surovina: dobroty na ochucení, mnozstvi: null, jednotka: "", poznamka: "marmeláda / kakao + cukr / ovoce / oříšky / opražená semínka – dle chuti", sekce: Ochucení }
postup:
  - "Jáhly v sítku spař (přelij horkou vodou). Díky tomu následně při vaření nezhořknou."
  - "Uvař v lehce osoleném mléce za stálého míchání do kašovité konzistence."
  - "Můžeš podávat s rozličnými dobrotami – doporučujeme dochutit kaši salkem a přidat pár sušených nebo čerstvých lesních plodů. Skvěle bude fungovat i svařené ovoce (jahody, lesní plody, hrušky, jablka…)."
  - "Tip: aby se kaše nepřipálila, vař ji ve vodní lázni nebo na mírnějším plameni a častěji míchej. A vždycky kaši slaď až v posledním kroku."
nutrice_na_porci: { kcal: 320, bilkoviny_g: 9, sacharidy_g: 45, tuky_g: 12 }
alergeny: [mléko]
vegetarian: true
poznamky: "Ochucení (oříšky, semínka) je volitelné – při alergiích vynechat. Při použití rostlinného mléka a margarínu lze připravit veganskou i bezlaktózovou variantu."
zdroj_dat: foto
overit: false
