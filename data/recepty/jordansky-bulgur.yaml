postup:
  - "Na dvou lžících olivového oleje orestuj cibuli dosklovata."
  - "Přidej nakrájený lilek, cuketu, nastrouhaná rajčata a další zeleninu dle chuti. Nech pár minut povařit."
  - "Přilij vodu, přidej rajčatový protlak a dochuť černým pepřem a solí."
  - "Jakmile to začne vařit, vsyp bulgur a nech vařit, dokud se voda nevypaří."
