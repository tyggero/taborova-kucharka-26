postup:
  - "Vejce uvaříme natvrdo, oloupeme a necháme stranou."
  - "Knedlíky: připravíme houskové knedlíky (šišky). Pokud máš parníček, pokládej je v několika vrstvách na utěrku a napař v páře. POZOR na vyvaření vody! (utěrka přivázaná na hrnec, voda dole)."
  - "Bešamel (jíška): v hrnci rozpustíme kostku másla a zaprašujeme hladkou moukou, dokud nevznikne hustá kaše."
  - "Do bešamelu postupně přiléváme mléko a smetanu, mícháme dohladka a ohříváme, dokud omáčka nezhoustne."
  - "Kopr nakrájíme (čerstvý nebo naložený) a vmícháme do omáčky, prohřejeme."
  - "Uvařená vejce nakrájíme a přidáme do omáčky (nebo podáváme navrch)."
  - "Dochutíme octem, solí a cukrem."
  - "Podáváme s nakrájeným houskovým knedlíkem."
nutrice_na_porci: { kcal: 550, bilkoviny_g: 18, sacharidy_g: 70, tuky_g: 22 }
alergeny: [lepek, mléko, vejce]
