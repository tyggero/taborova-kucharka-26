postup:
  - "Vejce uvař natvrdo (cca 10 minut od varu), zchlaď studenou vodou, oloupej a nech stranou."
  - "Knedlíky: připrav a napař houskové knedlíky. V parníčku pokládej šišky v několika vrstvách na utěrku a napařuj v páře cca 20–25 minut. Hlídej, ať se ve spodním hrnci nevyvaří voda (utěrku přivaž k hrnci, voda je dole, knedlíky nad ní)."
  - "Jíška: v hrnci rozpusť máslo a za stálého míchání zaprašuj hladkou moukou, dokud nevznikne hladká světlá jíška (asi 2 minuty)."
  - "Bešamel: do jíšky postupně přilévej mléko a smetanu a neustále míchej metlou, aby nevznikly hrudky. Vař a míchej, dokud omáčka nezhoustne."
  - "Nasekaný kopr (čerstvý nebo naložený) vmíchej do omáčky a krátce prohřej."
  - "Dochuť solí, cukrem a octem do jemně nasládlé až sladkokyselé chuti – přidávej po troškách a průběžně ochutnávej (vždy čistou lžící)."
  - "Uvařená vejce nakrájej na čtvrtky nebo plátky a buď je vmíchej do omáčky, nebo dávej až na talíř navrch."
  - "Podávej s nakrájeným houskovým knedlíkem a vejcem natvrdo."
nutrice_na_porci: { kcal: 550, bilkoviny_g: 18, sacharidy_g: 70, tuky_g: 22 }
