postup:
  - "Vejce uvař natvrdo, oloupej a nech stranou. Připrav houskové knedlíky (napařit)."
  - "Rozpusť máslo v hrnci, vsyp mouku a míchej cca 2 minuty (jíška)."
  - "Postupně přilévej vývar, při každém přidání promíchej metlou, aby nevznikly hrudky. Osol, opepři a přiveď k varu."
  - "Přiklop a nech provařit cca 30 minut na mírném ohni."
  - "Nalij smetanu, přiveď k varu a vař 2 minuty. Stáhni z plotny a přidej nasekaný kopr (nebo část omáčky s koprem rozmixuj)."
  - "Dochuť jablečným octem a cukrem na sladkokyselou chuť (začni 2 lžíce octa + 5 lžiček cukru)."
  - "Podávej s nakrájeným houskovým knedlíkem a vejcem natvrdo."
nutrice_na_porci: { kcal: 380, bilkoviny_g: 14, sacharidy_g: 45, tuky_g: 16 }
alergeny: [lepek, mléko, vejce]
vegetarian: true
poznamky: >-
  Vytěženo z webu uvedeného v Notion bookmarku (Prima Fresh – koprová omáčka). Recept je na
  4 porce, generátor přepočítá na 10. Doplněno o vejce natvrdo a houskový knedlík (klasické
  podávání). Pozn. kuchaře z minulých let pro velkou várku (~40 osob): cca 7 šišek knedlíku,
  mléko+smetana ~5 l + 3 l, hladká mouka ~3/4 kg – množství projít při vaření. Alergeny:
  lepek (mouka, knedlík), mléko (máslo, smetana), vejce. Pro vegetariánskou variantu použij
  zeleninový vývar.
