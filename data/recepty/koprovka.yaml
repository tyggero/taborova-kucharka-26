  - { surovina: hladká mouka, mnozstvi: 60, jednotka: g, poznamka: "", sekce: Omáčka }
  - { surovina: vývar (zeleninový nebo hovězí), mnozstvi: 1, jednotka: l, poznamka: "přilévat postupně", sekce: Omáčka }
  - { surovina: smetana ke šlehání (31%), mnozstvi: 200, jednotka: ml, poznamka: "", sekce: Omáčka }
  - { surovina: kopr, mnozstvi: 1, jednotka: hrst, poznamka: "čerstvý, nasekaný (nebo naložený)", sekce: Omáčka }
  - { surovina: jablečný ocet, mnozstvi: null, jednotka: "", poznamka: "cca 2 lžíce; na sladkokyselou chuť", sekce: Omáčka }
  - { surovina: cukr, mnozstvi: null, jednotka: "", poznamka: "cca 5 lžiček; doladit", sekce: Omáčka }
  - { surovina: sůl, mnozstvi: null, jednotka: "", poznamka: dle chuti, sekce: Omáčka }
  - { surovina: pepř, mnozstvi: null, jednotka: "", poznamka: dle chuti, sekce: Omáčka }
