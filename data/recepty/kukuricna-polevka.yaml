poznamky: >-
  NEVYTĚŽENO. V Notion stránce (382a86fa-0044-8009-a842-f8a2bf48a145) není žádný recept –
  jen prázdná vložená DB surovin a interní bookmark, žádná fotka ani odkaz. Suroviny i postup
  jsou pouze PLACEHOLDERY z běžné kukuřičné polévky a je NUTNÉ je celé doplnit ručně. Štítek:
  polévka. Nutrice je hrubý odhad. Alergeny závisí na doplnění (smetana = mléko). Vegetariánská
  varianta předpokládána.
