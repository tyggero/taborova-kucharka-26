vegetarian: false
poznamky: >-
  Vytěženo z tištěné Skautské kuchařky (foto v assets/recepty/kureci-paella.jpg, str. 94),
  fotka dobře čitelná, množství uvedena přímo v receptu na 10 porcí. Obsahuje máslo (mléko).
  Klobása (chorizo/čabajka) může obsahovat další alergeny – zkontrolovat etiketu. Bezlepkové,
  pokud je rýže a klobása bez lepku.
