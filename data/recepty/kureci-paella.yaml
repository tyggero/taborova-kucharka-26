postup:
  - "Kuřecí maso a papriku si nakrájej na menší kostky. Klobásu na kolečka a cibuli s česnekem najemno."
  - "Kuřecí maso osol, opepři a restuj na oleji v hrnci asi 4 minuty."
  - "Kuře vyndej a ve stejném hrnci orestuj na kolečka pokrájenou klobásu. Tu pak opět vyndej."
  - "Opět ve stejném hrnci chvíli restuj cibuli, přidej polovinu česneku a rýži, zasyp paprikou a kari a restuj asi 3 minuty, dokud rýže nezeskelnatí (získá lesk)."
  - "Podlij vínem a nech odpařit alkohol."
  - "Přidej rajčata a čerstvou papriku nakrájenou na kostičky. Podlij vodou nebo vývarem, přidej maso a klobásu a za stálého míchání vař do měkka."
  - "Když je rýže akorát na skus, přidej podle potřeby máslo a vývar, aby byla konzistence krémová."
  - "Zelené fazolky očisti, okrájej tvrdé stonky a spař ve vařící osolené vodě. Po minutě je vytáhni a zchlaď. Překrájej je na menší kousky a přidej do hotové paelly."
  - "Smíchej bylinky s druhou polovinou nasekaného česneku a kůrou z citronu, tím vytvoříš směs zvanou gremolata. Polovinu té směsi přidej do paelly a druhou polovinou ozdob jídlo v jednotlivých ešusech."
nutrice_na_porci: { kcal: 620, bilkoviny_g: 26, sacharidy_g: 55, tuky_g: 32 }
