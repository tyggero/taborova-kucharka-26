postup:
  - Uvařte penne podle návodu na obalu. Sceďte a odstavte stranou, než připravíte kuře a omáčku.
  - Kuře nakrájejte na 2,5cm kousky a osolte a opepřete.
  - Ve velké pánvi rozehřejte olivový olej na středně vysokém ohni. Přidejte kuře a smažte 6–8 minut, dokud není propečené a růžová barva zmizí.
  - Kuře přendejte na talíř a odstavte, než připravíte omáčku.
  - Do stejné pánve dejte máslo. Po rozpuštění osmahněte česnek asi 30 sekund do vůně. Přidejte mouku a zamíchejte do pasty (jíška).
  - Vmetejte kuřecí vývar, smetanu a parmazán.
  - Vmíchejte scezená sušená rajčata, papriku a italské bylinky. Dle potřeby dosolte a dopepřete.
  - Omáčku nechte několik minut probublávat, aby zhoustla.
  - Vraťte kuře do pánve spolu s uvařenými těstovinami. Promíchejte, aby se kuře i těstoviny obalily omáčkou.
  - Ozdobte nasekanou bazalkou a posypte parmazánem. Podávejte.
