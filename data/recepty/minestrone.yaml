postup:
  - "Předem si uvař (předem namočené) cizrnu/fazole a také brambory, rýži nebo malé těstoviny (na skus)."
  - "Tvrdší kořenovou zeleninu očisti a pokrájej na kostičky. Restuj ji 5 minut na olivovém oleji. Poté přidej měkčí zeleninu, taky na kostičky, a znovu restuj 5 minut. Nakonec přidej nasekanou cibuli a feferonku, česnek na plátky a restuj 5 minut."
  - "Přidej koření a rajčata a orestuj. Vlož cizrnu/fazole a přidej vodu (nebo vývar), přiveď k varu a povař 5–10 minut."
  - "Do hrnce přidej uvařené brambory/rýži/těstoviny. Dochuť solí a pepřem a přidej nasekané bylinky."
  - "Na aioli si utři česnek se lžičkou soli, poté přidej ostatní suroviny a vše smíchej v misce."
  - "Polévku při podávání ozdob parmazánem a podávej ideálně s čerstvým pečivem a česnekovou aioli. Do aioli se může namáčet pečivo, nebo rovnou přidej lžíci každému do polévky."
nutrice_na_porci: { kcal: 320, bilkoviny_g: 12, sacharidy_g: 32, tuky_g: 16 }
alergeny: [mléko, lepek, celer]
vegetarian: true
poznamky: "Aioli je zde zjednodušená pasta pocházející ze západního Středomoří. Brambory/rýži/těstoviny lze zvolit dle chuti. Bez aioli a parmazánu lze připravit veganskou variantu."
