id: ovesna-kase
nazev: Ovesná kaše
zdroj: ruční poznámky (foto z Notionu)
odkaz: ""
stitky: [Snídaně]
porce_original: 10
casy:
  - { faze: Namáčení, popis: "přes noc (cca 8 hod)" }
  - { faze: Vaření, popis: "15 min" }
suroviny:
  - { surovina: ovesné vločky, mnozstvi: 500, jednotka: g, poznamka: "na 10 lidí (cca 2 várky)", sekce: Základ }
  - { surovina: mléko, mnozstvi: 2, jednotka: l, poznamka: "na 10 lidí na hustou kaši; přesné množství doplnit při vaření (kolik se spotřebuje)", sekce: Základ }
  - { surovina: cukr, mnozstvi: null, jednotka: "", poznamka: "na doslazení – sladit až nakonec", sekce: Dochucení }
  - { surovina: zlepšováky na dochucení, mnozstvi: null, jednotka: "", poznamka: "rozinky, ovoce, …", sekce: Dochucení }
postup:
  - "Přes noc necháme vločky nasáknout v mléce – mléka dáme tolik, aby byly vločky ponořené a bylo mléko cca 3 cm nad vločkami."
  - "Ráno přilijeme mléko – opět trochu nad vločky, cca 1 cm."
  - "Začít ohřívat a míchat, kaše začne houstnout. Nepřivést k varu – POZOR, kaše se ráda připaluje!"
  - "Sundat z plotny, až bude hustá."
  - "Přidat zlepšováky a ochutnávat – nebo je dát vedle a každý si kaši ochutí sám."
nutrice_na_porci: { kcal: 300, bilkoviny_g: 11, sacharidy_g: 40, tuky_g: 9 }
alergeny: [lepek, mléko]
vegetarian: true
poznamky: "Varianta „falešné žabí müsli“: ohřát mléko, do horkého nasypat ovesné vločky (drcené jsou lepší), chvíli míchat a nechat odstát; podle potřeby přidat další ohřáté mléko. S rostlinným mlékem je kaše bezlaktózová."
zdroj_dat: foto
overit: true
