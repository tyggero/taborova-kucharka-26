id: paprikova-pomazanka-s-nivou-a-cottage
nazev: Papriková pomazánka s nivou a sýrem cottage
zdroj: vlastní odhad (v Notionu bez receptu)
odkaz: ""
stitky: [Svačina, Snídaně]
porce_original: 10
suroviny:
  - { surovina: cottage sýr, mnozstvi: 500, jednotka: g, poznamka: "základ pomazánky" }
  - { surovina: niva (sýr s modrou plísní), mnozstvi: 150, jednotka: g, poznamka: "rozmačkaná vidličkou" }
  - { surovina: máslo nebo pomazánkové máslo, mnozstvi: 100, jednotka: g, poznamka: "změklé, na pojení; lze vynechat" }
  - { surovina: paprika (červená), mnozstvi: 2, jednotka: ks, poznamka: "nadrobno nakrájená" }
  - { surovina: cibule nebo jarní cibulka, mnozstvi: 1, jednotka: ks, poznamka: "najemno; dle chuti" }
