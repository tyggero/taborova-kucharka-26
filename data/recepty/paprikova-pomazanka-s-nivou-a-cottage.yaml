  - { surovina: mletá sladká paprika, mnozstvi: null, jednotka: "", poznamka: "na dobarvení a dochucení; volitelné" }
postup:
  - "Nivu rozmačkej vidličkou a smíchej se sýrem cottage (a změklým máslem) do hladké pomazánky."
  - "Papriku a cibuli nakrájej nadrobno a vmíchej do pomazánky."
  - "Dochuť solí, pepřem a případně mletou sladkou paprikou."
  - "Podávej na čerstvém pečivu, ozdob plátkem papriky nebo jarní cibulkou."
nutrice_na_porci: { kcal: 160, bilkoviny_g: 9, sacharidy_g: 4, tuky_g: 12 }
