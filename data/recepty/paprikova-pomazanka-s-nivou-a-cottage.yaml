poznamky: >-
  POZOR: v Notionu je tato položka (Svačina/Snídaně) BEZ fotky a BEZ receptu –
  tělo stránky obsahuje jen vloženou DB surovin a bookmark. Suroviny i množství
  jsou ROZUMNÝ ODHAD podle názvu (papriková pomazánka s nivou a cottage),
  připraveno na cca 10 porcí. Před vařením PROJÍT a upřesnit. Alergeny: mléko
  (niva, cottage, máslo). Vegetariánské. Niva je výrazná chuť – množství dolaď.
