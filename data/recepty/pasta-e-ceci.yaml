postup:
  - Ve velkém hrnci rozehřej olivový olej, přidej česnek a rozmarýn, lehce osol a za stálého míchání smaž asi 5 minut do zlatova. Přidej chilli vločky a po 30 sekundách rajčatový protlak, smaž asi 1 minutu do ztmavnutí.
  - Vlij víno, seškrábni připečené kousky ze dna a vař asi 2 minuty, dokud se mírně nezredukuje.
  - Vmíchej 1 hrnek cizrny a 1 hrnek vývaru a cizrnu rozmačkej o stěnu hrnce. Přidej zbytek cizrny a vývaru (celkem cca 3 hrnky) a černý pepř, osol dle chuti. (U konzervované cizrny lze část cizrny s vývarem rozmixovat dohladka pro krémovější základ.)
  - Přiveď k varu, vsyp těstoviny a vař za častého míchání, dokud nejsou těsně před al dente a tekutina není mezi polévkovou a omáčkovou konzistencí. Podle potřeby dolij vodu nebo vývar.
  - Stáhni z ohně, vmíchej sýr a rychle zamíchej. Dochuť solí, rozděl do misek a zakápni olivovým olejem. Podávej s dalším strouhaným sýrem.
