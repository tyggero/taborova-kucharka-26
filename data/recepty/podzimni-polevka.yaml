  - { surovina: celer, mnozstvi: 1, jednotka: hrst, poznamka: "", sekce: Základ }
  - { surovina: česnek, mnozstvi: 2, jednotka: stroužek, poznamka: "", sekce: Základ }
  - { surovina: máslo, mnozstvi: null, jednotka: "", poznamka: "na opečení zeleniny", sekce: Základ }
  - { surovina: brambory, mnozstvi: 2, jednotka: ks, poznamka: "", sekce: Polévka }
  - { surovina: menší těstoviny, mnozstvi: 1, jednotka: hrnek, poznamka: "", sekce: Polévka }
  - { surovina: voda nebo vývar, mnozstvi: 2, jednotka: hrnek, poznamka: "přibližně, doplnit dle potřeby", sekce: Polévka }
