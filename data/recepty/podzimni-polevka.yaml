postup:
  - "Zeleninu (cibuli, mrkev, celer) opečte na másle, přidejte česnek a koření (italské koření, sůl, pepř, špetku kari, papriku)."
  - "Zalijte vodou nebo vývarem, vložte nakrájené brambory a vařte pod pokličkou do změknutí."
  - "Část polévky (zhruba 1/3) rozmixujte do hladka pro zahuštění a vraťte zpět."
  - "Přidejte smetanu, dokořeňte."
  - "Vhoďte těstoviny a vařte pod pokličkou až do stavu al dente."
  - "Podávejte s nastrouhaným parmezánem."
nutrice_na_porci: { kcal: 280, bilkoviny_g: 9, sacharidy_g: 34, tuky_g: 12 }
alergeny: [lepek, mléko]
vegetarian: true
poznamky: >-
  Vytěženo z popisku Instagram reelu (odkaz v těle Notion stránky); v Notionu samotném
  recept nebyl, jen odkaz a vložená (prázdná) DB surovin. Množství jsou orientační „na oko"
  (hrnky, hrsti) pro cca 4 porce – PROJÍT a přepočítat na táborové množství. Spolehlivost
  popisku videa je nejistá. Lepek z těstovin, mléko ze smetany a parmezánu. Pozor: parmezán
  bývá se zvířecím syřidlem – pro striktní vegetariány nahradit vegetariánskou variantou.
zdroj_dat: url
overit: true
