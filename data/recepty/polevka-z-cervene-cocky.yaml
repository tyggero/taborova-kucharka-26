poznamky: >-
  Vytěženo z fotky tištěné Skautské kuchařky (foto v assets/recepty/polevka-z-cervene-cocky.jpg, str. 54).
  Recept na 10 porcí, obtížnost nízká, cca 70 min. Suroviny i postup uvedeny kompletně.
  Lepek z chleba podávaného k polévce – bez chleba je polévka bezlepková. Volitelné kokosové
  mléko = alergen kokos (pak doplnit do alergenů). Veganská (vege). Citron se vaří v polévce
  a podle chuti se může vyndat.
