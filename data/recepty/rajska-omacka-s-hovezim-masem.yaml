poznamky: "Recept počítá s domácím hovězím vývarem vařeným z plece a zeleniny. Cukr (150 g) a ocet (5 lžic) dávají typicky sladkokyselou chuť – dochuťte dle potřeby. Volitelně lze zjemnit zakysanou smetanou."
