postup:
  - Vývar - Zeleninu (mrkev, petržel, celer, cibuli) překrojíme na velké kusy a spolu s hovězím masem vložíme do hrnce. Zalijeme studenou vodou a přivedeme k varu. Jakmile začne voda bublat, stáhneme oheň na minimum a naběračkou sbíráme pěnu. Přidáme bobkový list, nové koření, sůl a černý pepř a táhneme doměkka (cca 3 hodiny).
  - Omáčka - Na sádle zpěníme nakrájenou cibuli (250 g) a rajský protlak. Přidáme mouku a za stálého míchání ji asi půl minuty restujeme.
  - Zalijeme hovězím vývarem a promícháme metličkou. Přidáme špetku soli, cukr, ocet a koření (pepř, bobkový list, nové koření). Přivedeme k varu, stáhneme oheň na třetinu a vaříme za občasného míchání 20 minut.
  - Omáčku scedíme a na závěr vmícháme chlazené máslo, které ji zjemní a naleští. Podáváme s vařeným hovězím masem a houskovými knedlíky nebo těstovinami.
