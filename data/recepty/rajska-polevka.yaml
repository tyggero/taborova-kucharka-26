suroviny:
  - { surovina: rajčatový protlak nebo drcená rajčata, mnozstvi: null, jednotka: "", poznamka: "PLACEHOLDER – recept nebyl v Notionu vytěžitelný (žádná fotka ani text); doplnit" }
  - { surovina: cibule, mnozstvi: null, jednotka: "", poznamka: "PLACEHOLDER – doplnit" }
