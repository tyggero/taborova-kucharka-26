id: recky-kuskusovy-salat
nazev: Řecký kuskusový salát
zdroj: Vaříme na cestách (Skautská kuchařka)
odkaz: ""
stitky: [Oběd, Večeře]
porce_original: 10
casy:
  - { faze: Namáčení, popis: "cizrna přes noc (cca 8 hod)" }
  - { faze: Příprava, popis: "20 min" }
  - { faze: Vaření, popis: "30 min" }
suroviny:
  - { surovina: kuskus, mnozstvi: 700, jednotka: g, poznamka: "", sekce: Kuskus }
  - { surovina: voda / vývar, mnozstvi: null, jednotka: "", poznamka: "horký, na zalití kuskusu", sekce: Kuskus }
  - { surovina: suchá cizrna, mnozstvi: 250, jednotka: g, poznamka: "namočit ideálně přes noc", sekce: Kuskus }
  - { surovina: rajčata, mnozstvi: 625, jednotka: g, poznamka: "", sekce: Salát }
  - { surovina: sýr feta, mnozstvi: 190, jednotka: g, poznamka: "", sekce: Salát }
  - { surovina: černé olivy, mnozstvi: 2, jednotka: balení, poznamka: "", sekce: Salát }
  - { surovina: okurka, mnozstvi: 3, jednotka: ks, poznamka: "", sekce: Salát }
  - { surovina: červená cibule, mnozstvi: 2, jednotka: ks, poznamka: "", sekce: Salát }
  - { surovina: olivový olej, mnozstvi: 12, jednotka: PL, poznamka: "polévkové lžíce", sekce: Dresink }
  - { surovina: citron, mnozstvi: 2, jednotka: ks, poznamka: "", sekce: Dresink }
