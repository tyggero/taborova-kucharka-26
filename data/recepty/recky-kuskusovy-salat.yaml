  - { surovina: černý pepř, mnozstvi: null, jednotka: "", poznamka: dle chuti, sekce: Dresink }
postup:
  - "Cizrnu uvař doměkka (namoč ji ideálně přes noc do dostatečného množství vody)."
  - "Do kotlíku dej kuskus, zakápni olivovým olejem, přidej 3 špetky soli, oregano a promíchej vidličkou tak, aby se každé zrnko potkalo s trochou oleje. Zalij horkým vývarem či vodou, přiklop a nech nabobtnat. V závislosti na teplotě a množství vody bude kuskus měkký po 5–10 minutách."
  - "Mezitím si zeleninu i sýr nakrájej na kostičky. Hotový kuskus načechrej vidličkou a smíchej s nachystanými surovinami včetně uvařené cizrny a oliv."
  - "Podle chuti přidej sůl, pepř nebo oregano, zakápni šťávou z citronu. A můžeš servírovat."
nutrice_na_porci: { kcal: 380, bilkoviny_g: 13, sacharidy_g: 55, tuky_g: 12 }
alergeny: [lepek, mléko]
vegetarian: true
poznamky: >-
  Vytěženo z fotky stránky kuchařky v Notionu (assets/recepty/recky-kuskusovy-salat.jpg).
  Suroviny i postup čitelné a kompletní. 10 porcí, vege, obtížnost 2/5, 60 min.
  PL = polévková lžíce, KL = kávová lžička. Obsahuje lepek (kuskus) a mléko (feta).
  Pro bezlepkovou variantu nahradit kuskus např. quinoou; feta je z mléka.
