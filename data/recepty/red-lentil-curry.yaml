postup:
  - Červenou čočku propláchněte a přeberte (mohou v ní být kamínky).
  - V hluboké pánvi rozehřejte kokosový olej na středně vysokém ohni. Přidejte česnek, zázvor, čerstvou kurkumu a chilli papričku a restujte doměkka a dovonění.
  - Přidejte mleté koření (kmín, koriandr, indické chilli, kari, garam masala) a nechte cca 1 minutu opražit, aby se rozvonělo.
  - Podlijte zeleninovým vývarem a seškrábněte připečené kousky ze dna. Přidejte čočku a drcená rajčata, promíchejte.
  - Stáhněte oheň, přiklopte a nechte probublávat, dokud čočka většinou nezměkne.
  - Vmíchejte kokosové mléko, mandlové máslo, sůl a pepř. Ochutnejte a dolaďte koření. Vařte dál, dokud kari nezhoustne a nebude krémové.
  - Na závěr vmíchejte citronovou šťávu a čerstvý koriandr, odstavte z ohně. Podávejte s rýží a indickým plackovým chlebem.
