suroviny:
  - { surovina: červená řepa, mnozstvi: 750, jednotka: g, poznamka: "uvařená ve slupce" }
  - { surovina: vlašské ořechy, mnozstvi: 100, jednotka: g, poznamka: "" }
  - { surovina: Lučina nebo pomazánkové máslo, mnozstvi: 250, jednotka: g, poznamka: "" }
