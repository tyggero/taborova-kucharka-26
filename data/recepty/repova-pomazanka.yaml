id: repova-pomazanka
nazev: Řepová pomazánka
zdroj: Táborová Skautská Kuchařka
odkaz: ""
stitky: [Svačina]
porce_original: 10
casy:
  - { faze: Vaření, popis: "1 hod" }
  - { faze: Příprava, popis: "20 min" }
  - { faze: Chlazení, popis: "30 min" }
suroviny:
  - { surovina: červená řepa, mnozstvi: 750, jednotka: g, poznamka: "uvařená ve slupce", sekce: Pomazánka }
  - { surovina: vlašské ořechy, mnozstvi: 100, jednotka: g, poznamka: "", sekce: Pomazánka }
  - { surovina: Lučina nebo pomazánkové máslo, mnozstvi: 250, jednotka: g, poznamka: "", sekce: Pomazánka }
  - { surovina: česnek, mnozstvi: 7, jednotka: stroužek, poznamka: "", sekce: Pomazánka }
  - { surovina: sůl, mnozstvi: null, jednotka: "", poznamka: dle chuti, sekce: Pomazánka }
  - { surovina: pepř, mnozstvi: null, jednotka: "", poznamka: dle chuti, sekce: Pomazánka }
  - { surovina: jarní cibulka / petrželka / pažitka / čerstvé bylinky, mnozstvi: null, jednotka: "", poznamka: "na ozdobu a dochucení", sekce: Na ozdobu }
postup:
  - "Řepu vař ve vroucí vodě i se slupkou nejlépe úplně ponořenou cca 1 hodinu, dokud není měkká (záleží na velikosti). Můžeš ji péct i zabalenou v alobalu při 200 °C asi 45–60 minut – tím zesílí její sladkou chuť."
  - "Uvařenou řepu slij, nechej vychladnout a oloupej. Poté ji nastrouhej nahrubo či najemno do velké mísy."
  - "K nastrouhané řepě přidej Lučinu nebo pomazánkové máslo, nasekané nebo namleté vlašské ořechy a prolisovaný česnek. Promíchej, osol a opepři podle chuti."
  - "Pomazánku namaž na čerstvé pečivo a ozdob nasekanou jarní cibulkou, petrželkou nebo jinými bylinkami podle chuti."
nutrice_na_porci: { kcal: 180, bilkoviny_g: 5, sacharidy_g: 9, tuky_g: 14 }
alergeny: [mléko, ořechy]
vegetarian: true
poznamky: "Vlašské ořechy lze vynechat nebo nahradit slunečnicovými semínky (pro děti s alergií na ořechy)."
zdroj_dat: foto
