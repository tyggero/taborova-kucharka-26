postup:
  - "Sekanou kupujeme hotovou – stačí ji ohřát (v troubě nebo na pánvi) a podávat ke štouchaným bramborám."
  - "Brambory oloupej, omyj a nakrájej na kousky cca 5x5 cm. Pozvolna je vař v osolené vodě doměkka, asi 25 minut."
  - "Pět minut před koncem přidej prolisovaný česnek a minutu před koncem omyté a překrájené zelené listy (blitvu/mangold/špenát)."
  - "Uvařené brambory sceď, přidej máslo (nebo olivový olej), rozšťouchej a dochuť solí a pepřem."
  - "Podávej štouchané brambory s ohřátou sekanou."
