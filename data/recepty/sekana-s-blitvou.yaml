poznamky: "Sekaná se kupuje hotová a jen ohřeje – zkontroluj alergeny na etiketě (lepek/vejce). Samotné štouchané brambory s blitvou jsou vegetariánská příloha; s olivovým olejem a bez sekané veganské."
