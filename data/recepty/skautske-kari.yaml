postup:
  - "Kari pasta: Zeleninu oloupej a najemno nastrouhej nebo nakrájej na menší kousky a dohladka rozmixuj v mixéru."
  - "Do hrnce nalij olej a přidej zeleninu. Vzniklou směs pomalu za stálého míchání restuj cca 10 až 15 minut."
  - "Přidej cukr, sůl, koření, rybí omáčku/tamari a dál pomalu opékej asi 5 minut, dokud se neodpaří voda a směs nedostane nazlátlou barvu a konzistenci kari pasty."
  - "Zchladlou pastu uzavři do dobře těsnící skleničky nebo krabičky a přiber s sebou na akci."
  - "Kari omáčka: Kari pastu (ať už domácí nebo kupovanou) nejprve minutu opeč v kotlíku na oleji."
  - "Přidej drcená rajčata, orestuj, dále kokosové mléko a vývar (vodu). Společně nech 15 minut probublávat."
  - "Dochuť limetou/citronem, rybí omáčkou a solí podle potřeby."
  - "Podávej s rýží, pečivem nebo plackami."
nutrice_na_porci: { kcal: 320, bilkoviny_g: 6, sacharidy_g: 22, tuky_g: 22 }
alergeny: [kokos, ryby]
vegetarian: false
poznamky: >-
  Vytěženo z tištěné Skautské kuchařky "Vaříme na cestách" (foto v assets/recepty/skautske-kari.jpg,
  str. 58), fotka dobře čitelná, množství uvedena přímo v receptu na 10 porcí (kari pasta je v malých
  gramážích, protože je koncentrovaná). Recept počítá s domácí kari pastou připravenou předem.
  Obsahuje kokos (kokosové mléko) a ryby (rybí omáčka) – pro vegetariánskou/veganskou variantu nahradit
  rybí omáčku tamari (sója). Bez masa je vegetariánské (nutrice uvedena bez přílohy a masa).
