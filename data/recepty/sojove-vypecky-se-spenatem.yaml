  - { surovina: vejce, mnozstvi: 5, jednotka: ks, poznamka: "na zahuštění špenátu", sekce: Špenát }
  - { surovina: česnek, mnozstvi: null, jednotka: "", poznamka: "prolisovat", sekce: Špenát }
