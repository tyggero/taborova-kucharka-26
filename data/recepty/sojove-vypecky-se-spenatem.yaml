  - { surovina: slunečnicový olej, mnozstvi: 200, jednotka: ml, poznamka: "", sekce: Výpečky }
  - { surovina: sójová omáčka, mnozstvi: 150, jednotka: ml, poznamka: "na marinádu", sekce: Výpečky }
