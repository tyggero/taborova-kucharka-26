  - { surovina: pancetta nebo guanciale, mnozstvi: null, jednotka: "", poznamka: "uzená, množství dle chuti (cca 80–100 g/porce)", sekce: Slanina }
  - { surovina: máslo, mnozstvi: 1, jednotka: lžíce, poznamka: "", sekce: Slanina }
  - { surovina: olivový olej, mnozstvi: 2, jednotka: lžíce, poznamka: "", sekce: Slanina }
postup:
  - Ve velkém hrnci zahřejeme alespoň 3 l vody, osolíme a vsypeme těstoviny. Vaříme na nejvyšší stupeň podle návodu na obalu, akorát na skus (al dente).
  - Slaninu nakrájíme na proužky/kostičky, parmazán nastrouháme najemno. Žloutky lehce prošleháme se sýrem a opepříme. Přilijeme 1,5–2 sběračky vroucí vody z těstovin a promícháme.
  - V pánvi rozehřejeme máslo a lžičku oleje, vsypeme slaninu a opečeme dokřupava.
  - Uvařené těstoviny slijeme (vodu nevyléváme!), přidáme do pánve, přilijeme sběračku vody, promícháme, povaříme 1 minutu, odstavíme a necháme 2 minuty odpočinout.
  - Vlijeme žloutkovou směs a promícháme do hladké omáčky, která obalí těstoviny. Rozdělíme na talíře a posypeme parmazánem.
