postup:
  - "Otevři obě balení tofu a nech sýr okapat. Pak ho otři papírovou utěrkou a nakrájej na kostky o straně asi 2,5 cm."
  - "Napíchej kostky na špejle (8 dřevěných špejlí; pokud používáš dřevěné, namoč je na deset minut do vody, aby se nespálily). Nalij do misky polévkovou lžíci sójové omáčky a všechny kostky tofu jí potři."
  - "Oloupej cibuli a jemně ji nakrájej. Oloupej a prolisuj česnek. Rozehřej olej a cibuli i česnek poduste doměkka."
  - "Kokosovou pastu nakrájej na malé kousky, dej ji do misky, přilij tři polévkové lžíce horké vody a zamíchej."
  - "Přidej šťávu z citronu nebo limety, přírodní cukr, chilli, máslo z burských oříšků a polévkovou lžíci sójové omáčky."
  - "Všechno důkladně promíchej a pak vmíchej cibuli a česnek. Touto směsí potři kostky tofu na špejlích."
  - "Naplň velký rendlík do poloviny vodou a přiveď ji k varu. Rozdrob do ní kostku bujonu. Přidej polévkovou lžíci oleje."
  - "Zapni gril na střední výkon. Rozlož špejle s tofu na pekáč s grilovací mřížkou a dej ho pod rozpálený gril."
  - "Tofu griluj celkem osm minut. Každé dvě minuty špejle s tofu obrať a znovu je potři máslem z burských oříšků."
  - "Mezitím dej do vroucí vody nudle, nech přejít varem a pak ztlum teplotu, aby voda jen mírně bublala. Vař dle návodu na obalu."
  - "Uvař nudle, slij vodu a dej je zpátky do rendlíku. Přidej nasekané listy petržele nebo koriandru."
  - "Nudle s bylinkami dobře promíchej. Rozděl je na talíře a na každý dej dva špízy. Hned servíruj."
