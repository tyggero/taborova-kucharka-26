postup:
  - "Mrkev a celer oloupej a na struhadle najemno nastrouhej."
  - "Maso, koření, sůl, vejce, mléko, utřený česnek a nasekané bylinky vlož do mísy. Všechnu cibuli oloupej a nakrájej najemno, polovinu z ní přidej najemno orestuj na oleji dohněda a přidej do mísy s mletým masem. Masovou směs řádně promíchej a nech chvilku odležet."
  - "K cibulce přidej nastrouhanou zeleninu a za stálého míchání restuj asi 5 minut. Přidej cukr, celý pepř a nové koření, nech cukr zkaramelizovat, pak přidej hořčici a zalij vývarem. Nakonec přidej bobkový list a smetanu."
  - "V menším rendlíku rozpusť máslo a opraž v něm mouku na tmavší jíšku. Metlou vmíchej do omáčky a omáčku dál často míchej. Vař na mírném ohni minimálně půl hodiny."
  - "Masovou směs si rozděl na čtyři stejné díly. Z každého dílu pak mokrýma rukama vytvaruj asi 15 kuliček a na velké široké pánvi se silným dnem pomalu smaž na oleji ze všech stran přibližně 10 minut. Pokud výpek z kuliček na pánvi není připálený, můžeš ho trochu přidat do omáčky."
  - "Omáčku dochuť podle potřeby nastrouhanou citronovou kůrou, citronem, solí, cukrem a octem. Vlož do ní hotové kuličky a pomalu prohřej."
  - "Brambory oloupej, pokrájej na menší části a vař přibližně 20 minut v osolené vodě. Sceď vodu a ihned podávej."
  - "Do ešusu vlož brambory, přidej kuličky s omáčkou, navrch ozdob lžičkou brusinkového kompotu a posyp nasekanou petrželkou nebo jinými bylinkami."
