id: testovinovy-salat
nazev: Řecký těstovinový salát
zdroj: aktin.cz
odkaz: https://aktin.cz/recky-testovinovy-salat
stitky: [Svačina]
porce_original: 2
casy:
  - { faze: Příprava, popis: "15 min" }
  - { faze: Vaření, popis: "12 min" }
  - { faze: Chlazení, popis: "30 min" }
suroviny:
  - { surovina: fusilli těstoviny, mnozstvi: 250, jednotka: g, poznamka: "uvařit dle návodu, nechat vychladnout", sekce: Základ }
  - { surovina: okurka, mnozstvi: 0.5, jednotka: ks, poznamka: "na kostičky", sekce: Základ }
  - { surovina: bílá paprika, mnozstvi: 1, jednotka: ks, poznamka: "na kostičky", sekce: Základ }
  - { surovina: cherry rajčata, mnozstvi: 150, jednotka: g, poznamka: "nakrájená", sekce: Základ }
  - { surovina: červená cibule, mnozstvi: 0.5, jednotka: ks, poznamka: "nadrobno", sekce: Základ }
  - { surovina: zelené olivy, mnozstvi: 30, jednotka: g, poznamka: "nakrájené", sekce: Základ }
  - { surovina: balkánský sýr, mnozstvi: 60, jednotka: g, poznamka: "rozdrobený", sekce: Zálivka }
  - { surovina: olivový olej (extra panenský), mnozstvi: 3, jednotka: lžíce, poznamka: "", sekce: Zálivka }
  - { surovina: čerstvý kopr, mnozstvi: 1, jednotka: lžíce, poznamka: "", sekce: Zálivka }
  - { surovina: citron, mnozstvi: 1, jednotka: ks, poznamka: "nastrouhaná kůra + šťáva z poloviny", sekce: Zálivka }
  - { surovina: dijonská hořčice, mnozstvi: 1, jednotka: lžička, poznamka: "", sekce: Zálivka }
  - { surovina: oregano, mnozstvi: 0.5, jednotka: lžička, poznamka: "", sekce: Zálivka }
  - { surovina: bazalka, mnozstvi: 0.5, jednotka: lžička, poznamka: "sušená", sekce: Zálivka }
  - { surovina: sušený česnek, mnozstvi: 0.5, jednotka: lžička, poznamka: "", sekce: Zálivka }
  - { surovina: třtinový cukr, mnozstvi: 1, jednotka: lžička, poznamka: "", sekce: Zálivka }
  - { surovina: pepř, mnozstvi: null, jednotka: "", poznamka: "dle chuti", sekce: Zálivka }
  - { surovina: mořská sůl, mnozstvi: null, jednotka: "", poznamka: "špetka", sekce: Zálivka }
postup:
  - "Uvař těstoviny podle návodu a nech vychladnout."
  - "Okurku a papriku nakrájej na kostičky, cibuli nadrobno, rajčata a olivy nakrájej."
  - "Připrav zálivku: smíchej olivový olej, kopr, dijonskou hořčici, citronovou kůru a šťávu, cukr, oregano, bazalku, sušený česnek, sůl, pepř a rozdrobený balkánský sýr."
  - "Vychlazené těstoviny přendej do mísy, přidej zeleninu a zálivku."
  - "Dobře promíchej a podávej chlazené."
nutrice_na_porci: { kcal: 480, bilkoviny_g: 14, sacharidy_g: 58, tuky_g: 20 }
alergeny: [lepek, mléko, hořčice]
vegetarian: true
poznamky: >-
  Vytěženo z odkazu (aktin.cz, řecký těstovinový salát). Z receptu odstraněno
  značkové označení surovin (uvedeny obecně). Recept je na 2 porce, generátor
  přepočítá na 10. Alergeny: lepek (těstoviny – lze bezlepkové), mléko (balkánský
  sýr), hořčice (dijonská). Vegetariánské.
zdroj_dat: url
overit: false
