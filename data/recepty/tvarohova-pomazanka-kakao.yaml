id: tvarohova-pomazanka-kakao
nazev: Tvarohová pomazánka (rozhuda) + kakao
zdroj: fresh.iprima.cz (rozhuda) – snídaňový set s kakaem
odkaz: https://fresh.iprima.cz/recepty/rozhuda-tradicni-tvarohova-pomazanka-s-pazitkou
stitky: [Snídaně]
porce_original: 4
casy:
  - { faze: Příprava, popis: "15 min" }
suroviny:
  - { surovina: měkký tvaroh, mnozstvi: 250, jednotka: g, poznamka: "", sekce: Pomazánka }
  - { surovina: máslo, mnozstvi: 75, jednotka: g, poznamka: "změklé", sekce: Pomazánka }
  - { surovina: smetana nebo mléko, mnozstvi: 3, jednotka: lžíce, poznamka: "na zředění konzistence (2–3 lžíce)", sekce: Pomazánka }
  - { surovina: cukr, mnozstvi: 0.5, jednotka: lžička, poznamka: "", sekce: Pomazánka }
  - { surovina: drcený kmín, mnozstvi: 1, jednotka: lžička, poznamka: "", sekce: Pomazánka }
  - { surovina: pažitka, mnozstvi: 3, jednotka: lžíce, poznamka: "nasekaná (2–3 lžíce)", sekce: Pomazánka }
  - { surovina: cibule, mnozstvi: 0.5, jednotka: ks, poznamka: "najemno; lze vynechat", sekce: Pomazánka }
  - { surovina: sůl, mnozstvi: null, jednotka: "", poznamka: dle chuti, sekce: Pomazánka }
  - { surovina: kakao, mnozstvi: null, jednotka: "", poznamka: "k pití – kakaový prášek + mléko + cukr (samostatný nápoj k snídani)", sekce: K pití }
postup:
  - "Máslo utři do pěny, přimíchej tvaroh a zřeď smetanou nebo mlékem na požadovanou konzistenci."
  - "Dochuť solí, cukrem a drceným kmínem."
  - "Vmíchej najemno nakrájenou cibuli a nasekanou čerstvou pažitku."
  - "Podávej na plátcích chleba/pečiva. K pití uvař teplé kakao (kakaový prášek rozmíchaný v mléce s cukrem)."
nutrice_na_porci: { kcal: 230, bilkoviny_g: 10, sacharidy_g: 6, tuky_g: 18 }
alergeny: [mléko]
vegetarian: true
poznamky: >-
  V Notionu je položka „Tvarohová pomazánka + kakao" (Snídaně) bez fotky – tělo
  obsahuje jen vloženou DB surovin a dva odkazy na recepty (rozhuda na fresh.iprima.cz
  a tvarohová s paprikou na vareni.cz). Suroviny + postup převzaty z odkazu na rozhudu
  (4 porce). Druhý odkaz (vareni.cz) se nepodařilo načíst (web nevrátil obsah).
  „+ kakao" je doprovodný nápoj k snídani (množství neuvedeno). Pro tábor (~40 osob)
  je třeba PŘEPOČÍTAT (cca 10×). Alergeny: mléko. Vegetariánské. overit kvůli volbě
  konkrétní pomazánky a doplnění množství kakaa.
zdroj_dat: url
overit: true
