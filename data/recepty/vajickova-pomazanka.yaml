id: vajickova-pomazanka
nazev: Vajíčková pomazánka
zdroj: Prima Fresh (bookmark v Notionu)
odkaz: https://fresh.iprima.cz/prima-fresh/vajickova-pomazanka
stitky: [Snídaně]
porce_original: 2
casy:
  - { faze: Příprava, popis: "10 min" }
  - { faze: Vaření, popis: "10 min" }
suroviny:
  - { surovina: vejce, mnozstvi: 4, jednotka: ks, poznamka: "uvařená natvrdo", sekce: Pomazánka }
  - { surovina: jarní cibulka, mnozstvi: 1, jednotka: ks, poznamka: "na kolečka", sekce: Pomazánka }
  - { surovina: lučina (smetanový sýr), mnozstvi: 200, jednotka: g, poznamka: "", sekce: Pomazánka }
  - { surovina: majonéza, mnozstvi: 4, jednotka: lžíce, poznamka: "", sekce: Pomazánka }
  - { surovina: dijonská hořčice, mnozstvi: 1, jednotka: lžička, poznamka: "", sekce: Pomazánka }
  - { surovina: sůl, mnozstvi: null, jednotka: "", poznamka: "dle chuti", sekce: Pomazánka }
  - { surovina: pepř, mnozstvi: null, jednotka: "", poznamka: "čerstvě mletý, dle chuti", sekce: Pomazánka }
  - { surovina: pažitka, mnozstvi: null, jednotka: "", poznamka: "na ozdobu", sekce: Na podávání }
  - { surovina: ředkvičky, mnozstvi: 1, jednotka: svazek, poznamka: "", sekce: Na podávání }
postup:
  - "Vejce oloupej a nakrájej na co nejmenší kousky, dej do větší mísy."
  - "Přidej na kolečka nakrájenou jarní cibulku, lučinu, majonézu a dijonskou hořčici."
  - "Všechno dobře promíchej a pomazánku dochuť solí a čerstvě mletým pepřem."
  - "Mazej na krajíce (kváskového) chleba, posyp nasekanou pažitkou a oblož ředkvičkami."
nutrice_na_porci: { kcal: 420, bilkoviny_g: 16, sacharidy_g: 6, tuky_g: 37 }
alergeny: [vejce, mléko, hořčice]
vegetarian: true
poznamky: "Místo lučiny / části majonézy lze použít pomazánkové máslo."
zdroj_dat: url
overit: true
