id: vajickova-pomazanka
nazev: Vajíčková pomazánka
zdroj: Prima Fresh (bookmark v Notionu)
odkaz: https://fresh.iprima.cz/prima-fresh/vajickova-pomazanka
stitky: [Snídaně]
porce_original: 2
suroviny:
  - { surovina: vejce, mnozstvi: 4, jednotka: ks, poznamka: "uvařená natvrdo" }
  - { surovina: jarní cibulka, mnozstvi: 1, jednotka: ks, poznamka: "na kolečka" }
  - { surovina: lučina (smetanový sýr), mnozstvi: 200, jednotka: g, poznamka: "" }
  - { surovina: majonéza, mnozstvi: 4, jednotka: lžíce, poznamka: "" }
  - { surovina: dijonská hořčice, mnozstvi: 1, jednotka: lžička, poznamka: "" }
  - { surovina: sůl, mnozstvi: null, jednotka: "", poznamka: "dle chuti" }
  - { surovina: pepř, mnozstvi: null, jednotka: "", poznamka: "čerstvě mletý, dle chuti" }
  - { surovina: pažitka, mnozstvi: null, jednotka: "", poznamka: "na ozdobu" }
  - { surovina: ředkvičky, mnozstvi: 1, jednotka: svazek, poznamka: "na podávání" }
postup:
  - "Vejce oloupej a nakrájej na co nejmenší kousky, dej do větší mísy."
  - "Přidej na kolečka nakrájenou jarní cibulku, lučinu, majonézu a dijonskou hořčici."
  - "Všechno dobře promíchej a pomazánku dochuť solí a čerstvě mletým pepřem."
  - "Mazej na krajíce (kváskového) chleba, posyp nasekanou pažitkou a oblož ředkvičkami."
nutrice_na_porci: { kcal: 420, bilkoviny_g: 16, sacharidy_g: 6, tuky_g: 37 }
alergeny: [vejce, mléko, hořčice]
vegetarian: true
poznamky: >-
  V Notionu jen bookmark s titulkem „Jednoduchá vajíčková pomazánka s
  pomazánkovým máslem" + vložená DB surovin. Vytěženo z paralelního receptu
  Prima Fresh / Recepty.cz (lučina + majonéza + dijonská hořčice). Pozn.: titulek
  bookmarku zmiňuje pomazánkové máslo – varianta může používat místo lučiny/části
  majonézy pomazánkové máslo. Pro tábor množství násobit. Bez chleba je
  bezlepková. Overit – ověřit přesnou recepturu dle původního odkazu.
zdroj_dat: url
overit: true
