postup:
  - "Dej vařit vodu. Pohanku propláchni v cedníku studenou vodou a pak v hrnci zalij vroucí vodou – budeš jí potřebovat 2x víc než pohanky. Osol, zavři pokličku a hrnec schovej pod peřinu nebo do spacáku."
  - "Během 20 až 30 minut by měla pohanka změknout. Pokud spěcháš, můžeš nejdřív pohanku asi 7 minut vařit a až pak odstavit."
  - "Cibuli, slaninu/maso i brambory nakrájej na kostičky tak velké, aby se vešly na malou lžičku."
  - "Brambory dej vařit do osolené vody."
  - "Maso dej na pánev, podle potřeby přidej trochu tuku. Orestuj a přidej cibulku a po chvíli i najemno nakrájený česnek. Restuj do chvíle, než bude cibulka zlatavá."
  - "Pokud chceš silnější chuť česneku, část utři a přidej k jídlu, až bude skoro hotové."
  - "Nakonec smíchej uvařenou pohanku, brambory, maso s cibulkou a sýr."
  - "Dochuť majoránkou, paprikou nebo rozmarýnem a podle chuti přidej něco kvašeného, třeba kysané zelí."
nutrice_na_porci: { kcal: 520, bilkoviny_g: 20, sacharidy_g: 50, tuky_g: 26 }
alergeny: [mléko]
vegetarian: false
poznamky: >-
  Vytěženo z tištěné Skautské kuchařky (foto v assets/recepty/valasska-pohanka.jpg, str. 120),
  fotka dobře čitelná, množství uvedena přímo v receptu na 10 porcí. Pohanka je přirozeně
  bezlepková (pozor na možnou kontaminaci u nekvalitních zdrojů). Brynza/sýr obsahuje mléko.
  Pro vegetariány lze slaninu/maso vynechat. Volitelné kvašené přílohy.
