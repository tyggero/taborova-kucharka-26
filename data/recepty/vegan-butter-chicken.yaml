postup:
  - Tofu zabal do papírových utěrek, zatěž talířem a něčím těžkým a nech 20 minut odkapat (lze vynechat u extra pevného tofu).
  - Troubu předehřej na 200 °C a plech vylož pečicím papírem.
  - Tofu nakrájej na asi 6 plátků a každý plátek natrhej na středně velké kousky (dodá to lepší texturu než kostky).
  - Kousky tofu vlož do sáčku spolu s olivovým olejem, škrobem a solí, zavři a jemně protřep, aby se obalily. Rozlož na plech a peč 25–30 minut do zlatova a křupava.
  - Mezitím připrav omáčku - ve velké pánvi rozpusť veganské máslo, restuj cibuli 3–4 minuty, přidej zázvor a česnek a smaž ještě 1 minutu.
  - Přidej koření, sůl, rajčatový protlak a kokosové mléko. Míchej do hladka a poté nech 5–10 minut probublávat za občasného míchání.
  - Hotové tofu vmíchej do omáčky a obal kousky. Podávej s rýží a naanem, posyp čerstvým koriandrem.
