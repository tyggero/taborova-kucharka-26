postup:
  - "Sójový granulát smíchej se sójovou omáčkou, hořčicí, majoránkou, oreganem a 150 ml oleje. Zalij vodou, až je vše ponořené. Osol a přidej pár kousků bobkového listu, pár kuliček nového koření a špetku pepře. Vař asi 15 minut doměkka. Sceď a nech okapat."
  - "Ve velkém hrnci rozehřej olivový olej a asi 10 minut na něm restuj najemno pokrájenou cibuli a nadrobno nakrájenou mrkev, dokud cibule nezeskelovatí a mrkev trochu nezměkne. Zhruba v půlce kroku přidej česnek na plátky."
  - "Přidej na malé kostičky nakrájený lilek a cuketu a nech na mírném ohni restovat dalších 20–30 minut. Občas zeleninu promíchej, ať se nepřichytí."
  - "Přidej nachystaný sójový granulát, vmíchej rajčatový protlak a oregano. Zamíchej a po minutě až dvou přidej sterilovaná rajčata pokrájená na kousky."
  - "Zalij vodou nebo vývarem, přihoď pár kousků bobkového listu a nech aspoň 45 minut probublávat. Občas promíchej."
  - "Těstoviny uvař podle návodu na obalu."
  - "Těstoviny s omáčkou posyp nastrouhaným parmazánem (nebo jiným tvrdým sýrem)."
