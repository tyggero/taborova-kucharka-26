postup:
  - "Placičky: zeleninu i sýr nastrouhej nahrubo (nebo půlku nahrubo, půlku najemno). Cibuli nakrájej najemno."
  - "Smíchej nastrouhanou zeleninu, sýr a cibuli, přidej vejce, strouhanku, česnek, koření a bylinky a vše promíchej v kompaktní těsto, ze kterého půjdou tvarovat placičky."
  - "Placičky smaž na oleji dozlatova, pokud máš k dispozici troubu, tak peč na pečicím papíře 10 minut po každé straně."
  - "Kaše: dej vařit hrnec s osolenou vodou."
  - "Brambory oloupej, nakrájej na kostky a vsyp do vařicí vody na přibližně 20 minut."
  - "Opatrně ohřej mléko (aby se nespálilo), stačí, když nebude úplně studené."
  - "Uvařené brambory slij."
  - "Do brambor přidej máslo a teplé mléko a rozšťouchej je na hrubou kaši, pokud máš mixér, rozmixuj je na jemnou kaši. Čím menší kostky, tím jednodušší bude práce se šťoucháním/mixováním. Nakonec osol."
  - "Můžeš podávat s dozlatova osmaženou cibulkou nebo čerstvou petrželkou/pažitkou."
nutrice_na_porci: { kcal: 360, bilkoviny_g: 10, sacharidy_g: 45, tuky_g: 15 }
alergeny: [lepek, mléko, vejce]
vegetarian: true
poznamky: "S kukuřičnou strouhankou bude jídlo bezlepkové. Do placiček lze přidat zbylé přílohy (brambory, rýže, jáhly, quinoa, kroupy) max. ve stejném množství jako strouhanka."
